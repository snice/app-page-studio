<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      color-scheme: light;
      --blue: #2f73ff;
      --blue-dark: #1f64f2;
      --bg: #ffffff;
      --panel: #f6f6f7;
      --line: #e1e2e5;
      --text: #1f2329;
      --muted: #777d86;
      --soft-blue: #dfe9ff;
      --danger: #d92d20;
      --success: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select, textarea {
      font: inherit;
      letter-spacing: 0;
    }
    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }
    .app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .icon-btn {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }
    .icon-btn:hover { background: #f2f3f5; }
    .icon-back,
    .icon-search,
    .icon-plus,
    .icon-chevron,
    .icon-settings,
    .icon-folder,
    .icon-project {
      width: 20px;
      height: 20px;
      display: inline-block;
      position: relative;
      flex: none;
    }
    .icon-back::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 4px;
      width: 12px;
      height: 12px;
      border-left: 2px solid #20242a;
      border-bottom: 2px solid #20242a;
      transform: rotate(45deg);
    }
    .icon-search {
      border: 2px solid #20242a;
      border-radius: 999px;
      width: 18px;
      height: 18px;
    }
    .icon-search::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 2px;
      right: -6px;
      bottom: -2px;
      background: #20242a;
      transform: rotate(45deg);
      border-radius: 2px;
    }
    .icon-plus::before,
    .icon-plus::after {
      content: '';
      position: absolute;
      background: #20242a;
      border-radius: 2px;
    }
    .icon-plus::before { width: 20px; height: 2px; top: 9px; left: 0; }
    .icon-plus::after { width: 2px; height: 20px; top: 0; left: 9px; }
    .icon-chevron::before {
      content: '';
      position: absolute;
      right: 3px;
      top: 3px;
      width: 10px;
      height: 10px;
      border-top: 2px solid #20242a;
      border-right: 2px solid #20242a;
      transform: rotate(45deg);
    }
    .icon-settings {
      border: 2px solid #20242a;
      border-radius: 999px;
    }
    .icon-settings::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 999px;
      border: 2px solid #20242a;
    }
    .icon-folder,
    .icon-project {
      border: 2px solid #20242a;
      border-radius: 4px;
    }
    .icon-folder::before {
      content: '';
      position: absolute;
      left: 1px;
      top: -5px;
      width: 10px;
      height: 6px;
      border: 2px solid #20242a;
      border-bottom: 0;
      border-radius: 4px 4px 0 0;
      background: #fff;
    }
    .icon-project::before {
      content: '';
      position: absolute;
      left: 2px;
      right: 2px;
      top: 4px;
      height: 2px;
      background: #20242a;
    }
    .content {
      flex: 1;
      padding: 24px 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }
    .field-row {
      display: grid;
      grid-template-columns: 120px 1fr 1fr;
      gap: 10px;
      align-items: center;
    }
    .label {
      color: #30343a;
      font-size: 15px;
      font-weight: 650;
    }
    .hint {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 6px;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      color: #fff;
      background: #a0a6af;
      font-size: 11px;
    }
    select, input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }
    textarea {
      min-height: 112px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    select:focus, input:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47,115,255,0.14);
    }
    .preview {
      min-height: 206px;
      border-radius: 8px;
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 18px;
    }
    .preview.scanning .preview-box {
      border-color: var(--blue);
      background: #edf3ff;
    }
    .preview-box {
      width: 54px;
      height: 42px;
      border: 2px solid #d4d6da;
      transform: perspective(80px) rotateX(18deg);
      background: #eceeef;
    }
    .preview-title { font-size: 18px; }
    .preview-sub { font-size: 12px; color: #8c929b; }
    .radio-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 12px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 36px;
      font-size: 15px;
      color: var(--text);
    }
    .radio-dot {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid #a6abb2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .radio-option.active .radio-dot {
      border-color: var(--blue);
      border-width: 5px;
    }
    .picker-row {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr) 24px;
      align-items: center;
      gap: 12px;
      padding: 0 14px;
      background: #fff;
    }
    .picker-label {
      color: var(--muted);
      border-right: 1px solid var(--line);
      font-size: 15px;
    }
    .picker-value {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 16px;
      color: var(--text);
    }
    .upload-btn {
      height: 48px;
      border-radius: 7px;
      background: var(--blue);
      color: #fff;
      font-size: 16px;
      font-weight: 750;
      margin-top: auto;
    }
    .upload-btn:hover { background: var(--blue-dark); }
    .footer-settings {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      width: max-content;
      margin-top: 8px;
      font-size: 15px;
      font-weight: 700;
    }
    .status-line {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .status-line.error { color: var(--danger); }
    .status-line.success { color: var(--success); }
    .progress {
      height: 5px;
      border-radius: 999px;
      overflow: hidden;
      background: #edf0f5;
    }
    .progress > div {
      height: 100%;
      width: 0%;
      background: var(--blue);
      transition: width 120ms ease-out;
    }
    .view {
      display: none;
      flex: 1;
      min-height: 0;
      flex-direction: column;
    }
    .view.active { display: flex; }
    .sub-toolbar {
      height: 70px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 40px 1fr auto auto;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--line);
    }
    .sub-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 750;
    }
    .sub-search {
      display: none;
      padding: 0 24px 12px;
      border-bottom: 1px solid var(--line);
    }
    .sub-search.active { display: block; }
    .list {
      flex: 1;
      overflow: auto;
      padding: 12px 14px;
    }
    .list-item {
      min-height: 48px;
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr);
      align-items: center;
      gap: 14px;
      padding: 0 26px;
      border-radius: 7px;
      color: var(--text);
      font-size: 16px;
    }
    .list-item.selected { background: var(--soft-blue); }
    .list-item-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sub-footer {
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
      padding: 0 24px;
    }
    .footer-btn {
      min-width: 104px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 15px;
      font-weight: 750;
    }
    .footer-btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }
    .settings-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .settings-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
    }
    .settings-card strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 5px;
    }
    .token-state {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 750;
      margin-left: 8px;
    }
    .token-state.valid {
      color: var(--success);
      background: rgba(22, 163, 74, 0.12);
    }
    .token-state.invalid {
      color: var(--danger);
      background: rgba(217, 45, 32, 0.12);
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="mainView" class="view active">
      <main class="content">
        <div class="field-row">
          <div class="label">切图倍数 <span class="hint">?</span></div>
          <select id="platformSelect">
            <option value="ios">iOS</option>
            <option value="android">Android</option>
          </select>
          <select id="scaleSelect">
            <option value="1">@1x</option>
            <option value="2">@2x</option>
            <option value="3" selected>@3x</option>
          </select>
        </div>

        <div class="preview" id="scanPreview">
          <div class="preview-box"></div>
          <div class="preview-title">未扫描画板</div>
          <div class="preview-sub">切换范围后会自动扫描预览</div>
        </div>

        <div class="radio-row">
          <button class="radio-option" type="button" data-scope="current-page">
            <span class="radio-dot"></span><span>该页全部画板</span>
          </button>
          <button class="radio-option active" type="button" data-scope="selection">
            <span class="radio-dot"></span><span id="selectionLabel">选中画板</span>
          </button>
        </div>

        <button id="projectPicker" class="picker-row" type="button">
          <span class="picker-label">项目</span>
          <span id="projectValue" class="picker-value">请选择项目</span>
          <span class="icon-chevron"></span>
        </button>

        <button id="groupPicker" class="picker-row" type="button">
          <span class="picker-label">分组</span>
          <span id="groupValue" class="picker-value">未分组</span>
          <span class="icon-chevron"></span>
        </button>

        <div>
          <div id="status" class="status-line"></div>
          <div class="progress"><div id="progressBar"></div></div>
        </div>

        <button id="uploadButton" class="upload-btn" type="button">上传</button>
        <button id="settingsButton" class="footer-settings" type="button">
          <span class="icon-settings"></span><span>设置</span>
        </button>
      </main>
    </div>

    <div id="settingsView" class="view">
      <div class="sub-toolbar">
        <button class="icon-btn back-main" type="button"><span class="icon-back"></span></button>
        <div></div>
        <div class="sub-action">设置</div>
      </div>
      <div class="settings-body">
        <label>
          服务器地址
          <input id="serverUrlInput" type="url" placeholder="例如 http://localhost:3000">
        </label>
        <label>
          Token
          <textarea id="tokenInput" placeholder="粘贴 App Studio 生成的 Pixso 导入令牌"></textarea>
        </label>
        <div class="settings-card">
          <strong>令牌状态 <span id="tokenState" class="token-state invalid">未验证</span></strong>
          <div id="tokenMeta">填写服务器地址和 token 后点击验证。</div>
        </div>
        <div class="status-line" id="settingsStatus"></div>
      </div>
      <div class="sub-footer">
        <button class="footer-btn back-main" type="button">取消</button>
        <button id="saveTokenButton" class="footer-btn primary" type="button">确认</button>
      </div>
    </div>

    <div id="projectView" class="view">
      <div class="sub-toolbar">
        <button class="icon-btn back-main" type="button"><span class="icon-back"></span></button>
        <div></div>
        <button class="sub-action" type="button" disabled><span class="icon-plus"></span><span>新建项目</span></button>
        <button id="projectSearchToggle" class="sub-action" type="button"><span class="icon-search"></span><span>搜索</span></button>
      </div>
      <div id="projectSearch" class="sub-search"><input id="projectSearchInput" type="text" placeholder="搜索项目"></div>
      <div id="projectList" class="list"></div>
      <div class="sub-footer">
        <button class="footer-btn back-main" type="button">取消</button>
        <button id="confirmProjectButton" class="footer-btn primary" type="button">确认</button>
      </div>
    </div>

    <div id="groupView" class="view">
      <div class="sub-toolbar">
        <button class="icon-btn back-main" type="button"><span class="icon-back"></span></button>
        <div></div>
        <button class="sub-action" type="button" disabled><span class="icon-plus"></span><span>新建分组</span></button>
        <button id="groupSearchToggle" class="sub-action" type="button"><span class="icon-search"></span><span>搜索</span></button>
      </div>
      <div id="groupSearch" class="sub-search"><input id="groupSearchInput" type="text" placeholder="搜索分组"></div>
      <div id="groupList" class="list"></div>
      <div class="sub-footer">
        <button class="footer-btn back-main" type="button">取消</button>
        <button id="confirmGroupButton" class="footer-btn primary" type="button">确认</button>
      </div>
    </div>
  </div>

  <script>
    var state = {
      view: 'main',
      serverUrl: '',
      token: '',
      tokenInfo: null,
      projects: [],
      selectedProjectId: null,
      pendingProjectId: null,
      selectedGroupId: null,
      pendingGroupId: null,
      scope: 'selection',
      busy: false,
      scanning: false,
      scanRequestId: 0,
      lastScanPages: []
    };

    var els = {
      mainView: document.getElementById('mainView'),
      settingsView: document.getElementById('settingsView'),
      projectView: document.getElementById('projectView'),
      groupView: document.getElementById('groupView'),
      serverUrlInput: document.getElementById('serverUrlInput'),
      tokenInput: document.getElementById('tokenInput'),
      tokenState: document.getElementById('tokenState'),
      tokenMeta: document.getElementById('tokenMeta'),
      settingsStatus: document.getElementById('settingsStatus'),
      saveTokenButton: document.getElementById('saveTokenButton'),
      settingsButton: document.getElementById('settingsButton'),
      projectPicker: document.getElementById('projectPicker'),
      groupPicker: document.getElementById('groupPicker'),
      projectValue: document.getElementById('projectValue'),
      groupValue: document.getElementById('groupValue'),
      projectList: document.getElementById('projectList'),
      groupList: document.getElementById('groupList'),
      projectSearch: document.getElementById('projectSearch'),
      groupSearch: document.getElementById('groupSearch'),
      projectSearchInput: document.getElementById('projectSearchInput'),
      groupSearchInput: document.getElementById('groupSearchInput'),
      projectSearchToggle: document.getElementById('projectSearchToggle'),
      groupSearchToggle: document.getElementById('groupSearchToggle'),
      confirmProjectButton: document.getElementById('confirmProjectButton'),
      confirmGroupButton: document.getElementById('confirmGroupButton'),
      uploadButton: document.getElementById('uploadButton'),
      platformSelect: document.getElementById('platformSelect'),
      scaleSelect: document.getElementById('scaleSelect'),
      status: document.getElementById('status'),
      progressBar: document.getElementById('progressBar'),
      scanPreview: document.getElementById('scanPreview'),
      scanPreviewTitle: document.querySelector('#scanPreview .preview-title'),
      scanPreviewSub: document.querySelector('#scanPreview .preview-sub'),
      selectionLabel: document.getElementById('selectionLabel')
    };

    function post(message) {
      parent.postMessage({ pluginMessage: message }, '*');
    }

    function showView(view) {
      state.view = view;
      els.mainView.classList.toggle('active', view === 'main');
      els.settingsView.classList.toggle('active', view === 'settings');
      els.projectView.classList.toggle('active', view === 'project');
      els.groupView.classList.toggle('active', view === 'group');
    }

    function setStatus(message, kind) {
      els.status.textContent = message || '';
      els.status.className = 'status-line ' + (kind || '');
    }

    function setSettingsStatus(message, kind) {
      els.settingsStatus.textContent = message || '';
      els.settingsStatus.className = 'status-line ' + (kind || '');
    }

    function setProgress(done, total) {
      var percent = total > 0 ? Math.round((done / total) * 100) : 0;
      els.progressBar.style.width = Math.max(0, Math.min(100, percent)) + '%';
    }

    function setPreview(title, sub, scanning) {
      els.scanPreviewTitle.textContent = title || '';
      els.scanPreviewSub.textContent = sub || '';
      els.scanPreview.classList.toggle('scanning', !!scanning);
    }

    function setBusy(nextBusy) {
      state.busy = nextBusy;
      els.uploadButton.disabled = nextBusy;
      els.saveTokenButton.disabled = nextBusy;
      els.projectPicker.disabled = nextBusy;
      els.groupPicker.disabled = nextBusy;
    }

    function normalizeServerUrl(value) {
      var url = String(value || '').trim().replace(/\/+$/, '');
      var match = url.match(/^(https?:\/\/[^/]+)(?:\/.*)?$/i);
      if (!match) throw new Error('服务器地址必须以 http:// 或 https:// 开头');
      return match[1];
    }

    function parseToken(token) {
      var value = String(token || '').trim();
      var parts = value.split('.');
      if (parts.length !== 3 || parts[0] !== 'aps1') throw new Error('Token 格式无效');
      if (!parts[1] || !parts[2]) throw new Error('Token 格式无效');
      return value;
    }

    function formatDate(value) {
      if (!value) return '-';
      var date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString();
    }

    function getProjectById(id) {
      for (var i = 0; i < state.projects.length; i += 1) {
        if (String(state.projects[i].id) === String(id)) return state.projects[i];
      }
      return null;
    }

    function getSelectedProject() {
      return getProjectById(state.selectedProjectId);
    }

    function getSelectedGroup() {
      var project = getSelectedProject();
      var groups = project && project.groups ? project.groups : [];
      if (state.selectedGroupId === null) return { id: null, name: '未分组' };
      for (var i = 0; i < groups.length; i += 1) {
        if (String(groups[i].id) === String(state.selectedGroupId)) return groups[i];
      }
      return { id: null, name: '未分组' };
    }

    function updatePickers() {
      var project = getSelectedProject();
      var group = getSelectedGroup();
      els.projectValue.textContent = project ? project.name : '请选择项目';
      els.groupValue.textContent = project ? group.name : '请先选择项目';
      els.groupPicker.disabled = !project || state.busy;
    }

    function updateTokenStatus(valid, message) {
      els.tokenState.className = 'token-state ' + (valid ? 'valid' : 'invalid');
      els.tokenState.textContent = valid ? '有效' : '无效';
      els.tokenMeta.textContent = message || '';
    }

    function saveSettings() {
      post({ type: 'save-settings', settings: { serverUrl: state.serverUrl, token: state.token } });
    }

    async function verifyToken(serverUrl, token) {
      var normalizedServerUrl = normalizeServerUrl(serverUrl);
      var normalizedToken = parseToken(token);
      var response = await fetch(normalizedServerUrl + '/api/figma/verify', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + normalizedToken
        },
        body: JSON.stringify({})
      });
      var data = await response.json().catch(function () { return {}; });
      if (!response.ok || data.error) throw new Error(data.error || ('HTTP ' + response.status));
      state.serverUrl = normalizedServerUrl;
      state.token = normalizedToken;
      state.tokenInfo = data.token || null;
      state.projects = data.projects || [];
      if (!getProjectById(state.selectedProjectId)) {
        state.selectedProjectId = state.projects.length > 0 ? state.projects[0].id : null;
        state.selectedGroupId = null;
      }
      saveSettings();
      updatePickers();
      updateTokenStatus(true, '有效期至 ' + formatDate(state.tokenInfo && state.tokenInfo.expiresAt));
      return data;
    }

    function renderProjectList() {
      var keyword = els.projectSearchInput.value.trim().toLowerCase();
      var rows = state.projects.filter(function (project) {
        return !keyword || String(project.name || '').toLowerCase().indexOf(keyword) >= 0;
      });
      if (rows.length === 0) {
        els.projectList.innerHTML = '<div class="list-item"><span></span><span class="list-item-name">暂无项目</span></div>';
        return;
      }
      els.projectList.innerHTML = rows.map(function (project) {
        var selected = String(project.id) === String(state.pendingProjectId);
        return '<button type="button" class="list-item ' + (selected ? 'selected' : '') + '" data-project-id="' + project.id + '">' +
          '<span class="icon-project"></span><span class="list-item-name">' + escapeHtml(project.name) + '</span></button>';
      }).join('');
    }

    function renderGroupList() {
      var project = getSelectedProject();
      var keyword = els.groupSearchInput.value.trim().toLowerCase();
      var groups = [{ id: '', name: '未分组' }].concat(project && project.groups ? project.groups : []);
      var rows = groups.filter(function (group) {
        return !keyword || String(group.name || '').toLowerCase().indexOf(keyword) >= 0;
      });
      els.groupList.innerHTML = rows.map(function (group) {
        var id = group.id === '' ? '' : String(group.id);
        var selected = (id === '' && state.pendingGroupId === null) || String(state.pendingGroupId) === id;
        return '<button type="button" class="list-item ' + (selected ? 'selected' : '') + '" data-group-id="' + escapeHtml(id) + '">' +
          '<span class="icon-folder"></span><span class="list-item-name">' + escapeHtml(group.name) + '</span></button>';
      }).join('');
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function getOptions() {
      return {
        scope: state.scope,
        pageScale: 1,
        sliceScale: Number(els.scaleSelect.value) || 1,
        includeExportSettings: true,
        includeNamedSlices: true
      };
    }

    function updateSelectionLabel(count) {
      els.selectionLabel.textContent = count > 0 ? '选中画板 (' + count + ')' : '选中画板';
    }

    function scanCurrentScope() {
      if (state.busy) return;
      state.scanRequestId += 1;
      state.scanning = true;
      updateSelectionLabel(0);
      setProgress(0, 1);
      setStatus('扫描画板...');
      if (state.scope === 'selection') {
        setPreview('扫描中...', '正在读取当前选中的画板', true);
      } else {
        setPreview('扫描中...', '正在读取当前页顶层画板', true);
      }
      post({ type: 'scan', requestId: state.scanRequestId, options: getOptions() });
    }

    function handleScanResult(message) {
      if (typeof message.requestId === 'number' && message.requestId !== state.scanRequestId) return;
      var pages = Array.isArray(message.pages) ? message.pages : [];
      var totalSlices = pages.reduce(function (sum, page) {
        return sum + (Number(page.slices) || 0);
      }, 0);
      state.scanning = false;
      state.lastScanPages = pages;
      updateSelectionLabel(state.scope === 'selection' ? pages.length : 0);
      if (pages.length === 0) {
        if (state.scope === 'selection') {
          setPreview('未找到画板', '请选择 Frame / Component / Group，或切换为该页全部画板', false);
        } else {
          setPreview('未找到画板', '当前页没有可导出的顶层画板', false);
        }
        setStatus('未找到可导出的画板', 'error');
        return;
      }
      if (pages.length === 1) {
        var page = pages[0];
        setPreview(page.name || '未命名画板', (page.width || 0) + ' x ' + (page.height || 0) + ' · ' + totalSlices + ' 个切图', false);
      } else {
        setPreview(pages.length + ' 个画板', '共 ' + totalSlices + ' 个切图', false);
      }
      setStatus('扫描完成：' + pages.length + ' 个画板，' + totalSlices + ' 个切图', 'success');
    }

    async function uploadPayload(payload) {
      var serverUrl = normalizeServerUrl(state.serverUrl);
      var token = parseToken(state.token);
      var project = getSelectedProject();
      if (!project) throw new Error('请选择项目');
      var response = await fetch(serverUrl + '/api/figma/import', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + token
        },
        body: JSON.stringify(Object.assign({
          projectId: project.id,
          groupId: state.selectedGroupId,
          mode: 'upsert'
        }, payload))
      });
      var data = await response.json().catch(function () { return {}; });
      if (!response.ok || data.error) throw new Error(data.error || ('HTTP ' + response.status));
      setStatus('上传完成：' + (data.imported || 0) + ' 个页面，' + (data.assets || 0) + ' 个切图', 'success');
      setProgress(1, 1);
    }

    document.querySelectorAll('.radio-option').forEach(function (button) {
      button.addEventListener('click', function () {
        state.scope = button.getAttribute('data-scope');
        document.querySelectorAll('.radio-option').forEach(function (item) {
          item.classList.toggle('active', item === button);
        });
        scanCurrentScope();
      });
    });

    document.querySelectorAll('.back-main').forEach(function (button) {
      button.addEventListener('click', function () { showView('main'); });
    });

    els.settingsButton.addEventListener('click', function () {
      els.serverUrlInput.value = state.serverUrl || '';
      els.tokenInput.value = state.token || '';
      if (state.tokenInfo) updateTokenStatus(true, '有效期至 ' + formatDate(state.tokenInfo.expiresAt));
      else updateTokenStatus(false, '填写服务器地址和 token 后点击确认。');
      setSettingsStatus('');
      showView('settings');
    });

    els.saveTokenButton.addEventListener('click', function () {
      var serverUrl = els.serverUrlInput.value.trim();
      var token = els.tokenInput.value.trim();
      if (!serverUrl) {
        setSettingsStatus('请填写服务器地址', 'error');
        return;
      }
      if (!token) {
        setSettingsStatus('请填写 token', 'error');
        return;
      }
      setBusy(true);
      setSettingsStatus('验证 token 中...');
      verifyToken(serverUrl, token).then(function () {
        els.serverUrlInput.value = state.serverUrl;
        setSettingsStatus('设置已保存', 'success');
        showView('main');
      }).catch(function (error) {
        state.tokenInfo = null;
        state.projects = [];
        updatePickers();
        updateTokenStatus(false, error.message || String(error));
        setSettingsStatus(error.message || String(error), 'error');
      }).finally(function () {
        setBusy(false);
      });
    });

    els.projectPicker.addEventListener('click', function () {
      if (!state.tokenInfo) {
        setStatus('请先在设置中填写服务器地址并验证 token', 'error');
        return;
      }
      state.pendingProjectId = state.selectedProjectId;
      renderProjectList();
      showView('project');
    });

    els.groupPicker.addEventListener('click', function () {
      if (!getSelectedProject()) {
        setStatus('请先选择项目', 'error');
        return;
      }
      state.pendingGroupId = state.selectedGroupId;
      renderGroupList();
      showView('group');
    });

    els.projectList.addEventListener('click', function (event) {
      var row = event.target.closest('[data-project-id]');
      if (!row) return;
      state.pendingProjectId = row.getAttribute('data-project-id');
      renderProjectList();
    });

    els.groupList.addEventListener('click', function (event) {
      var row = event.target.closest('[data-group-id]');
      if (!row) return;
      var id = row.getAttribute('data-group-id');
      state.pendingGroupId = id === '' ? null : id;
      renderGroupList();
    });

    els.confirmProjectButton.addEventListener('click', function () {
      state.selectedProjectId = state.pendingProjectId;
      state.selectedGroupId = null;
      updatePickers();
      showView('main');
    });

    els.confirmGroupButton.addEventListener('click', function () {
      state.selectedGroupId = state.pendingGroupId;
      updatePickers();
      showView('main');
    });

    els.projectSearchToggle.addEventListener('click', function () {
      els.projectSearch.classList.toggle('active');
      els.projectSearchInput.focus();
    });
    els.groupSearchToggle.addEventListener('click', function () {
      els.groupSearch.classList.toggle('active');
      els.groupSearchInput.focus();
    });
    els.projectSearchInput.addEventListener('input', renderProjectList);
    els.groupSearchInput.addEventListener('input', renderGroupList);

    els.uploadButton.addEventListener('click', function () {
      if (!state.tokenInfo) {
        setStatus('请先在设置中填写服务器地址并验证 token', 'error');
        return;
      }
      if (!getSelectedProject()) {
        setStatus('请选择项目', 'error');
        return;
      }
      setBusy(true);
      setProgress(0, 1);
      setStatus('准备导出...');
      post({ type: 'export', options: getOptions() });
    });

    window.onmessage = function (event) {
      var message = event.data.pluginMessage;
      if (!message) return;
      if (message.type === 'settings') {
        if (message.settings && message.settings.serverUrl) {
          state.serverUrl = String(message.settings.serverUrl || '').replace(/\/+$/, '');
          els.serverUrlInput.value = state.serverUrl;
        }
        if (message.settings && message.settings.token) {
          state.token = message.settings.token;
          els.tokenInput.value = state.token;
          if (state.serverUrl) {
            verifyToken(state.serverUrl, state.token).catch(function () {
              updateTokenStatus(false, 'Token 未验证或已失效');
            });
          } else {
            updateTokenStatus(false, '请在设置中填写服务器地址');
          }
        }
      }
      if (message.type === 'export-progress') {
        setProgress(message.done || 0, message.total || 0);
        setStatus(message.label || '导出中...');
      }
      if (message.type === 'scan-result') {
        handleScanResult(message);
      }
      if (message.type === 'export-done') {
        uploadPayload(message.payload).catch(function (error) {
          setStatus(error.message || String(error), 'error');
        }).finally(function () {
          setBusy(false);
        });
      }
      if (message.type === 'error') {
        if (message.operation === 'scan') {
          state.scanning = false;
          setPreview('扫描失败', message.message || '扫描失败', false);
          setStatus(message.message || '扫描失败', 'error');
          return;
        }
        setBusy(false);
        setStatus(message.message || '导出失败', 'error');
      }
    };

    updatePickers();
  </script>
</body>
</html>
