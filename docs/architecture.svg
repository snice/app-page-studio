<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">App Page Studio Architecture</title>
  <desc id="desc">Runtime architecture diagram for the App Page Studio React client, Express server, WebSocket collaboration, SQLite database, and project file workspace.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <style>
      .bg { fill: #020617; }
      .card { fill: rgba(15, 23, 42, 0.62); stroke: #1e293b; stroke-width: 1.2; }
      .mask { fill: #0f172a; }
      .boundary-runtime { fill: rgba(251, 191, 36, 0.04); stroke: #fbbf24; stroke-width: 1; stroke-dasharray: 8 4; }
      .boundary-client { fill: rgba(8, 51, 68, 0.16); stroke: #22d3ee; stroke-width: 1; stroke-dasharray: 6 4; }
      .boundary-server { fill: rgba(6, 78, 59, 0.14); stroke: #34d399; stroke-width: 1; stroke-dasharray: 6 4; }
      .boundary-data { fill: rgba(76, 29, 149, 0.13); stroke: #a78bfa; stroke-width: 1; stroke-dasharray: 6 4; }
      .frontend { fill: rgba(8, 51, 68, 0.42); stroke: #22d3ee; stroke-width: 1.5; }
      .backend { fill: rgba(6, 78, 59, 0.42); stroke: #34d399; stroke-width: 1.5; }
      .database { fill: rgba(76, 29, 149, 0.42); stroke: #a78bfa; stroke-width: 1.5; }
      .storage { fill: rgba(120, 53, 15, 0.32); stroke: #fbbf24; stroke-width: 1.5; }
      .security { fill: rgba(136, 19, 55, 0.38); stroke: #fb7185; stroke-width: 1.5; }
      .bus { fill: rgba(251, 146, 60, 0.28); stroke: #fb923c; stroke-width: 1.2; }
      .external { fill: rgba(30, 41, 59, 0.62); stroke: #94a3b8; stroke-width: 1.5; }
      .line { fill: none; stroke: #64748b; stroke-width: 1.5; marker-end: url(#arrowhead); }
      .line-cyan { fill: none; stroke: #22d3ee; stroke-width: 1.6; marker-end: url(#arrowhead); }
      .line-emerald { fill: none; stroke: #34d399; stroke-width: 1.6; marker-end: url(#arrowhead); }
      .line-violet { fill: none; stroke: #a78bfa; stroke-width: 1.6; marker-end: url(#arrowhead); }
      .line-amber { fill: none; stroke: #fbbf24; stroke-width: 1.6; marker-end: url(#arrowhead); }
      .line-rose { fill: none; stroke: #fb7185; stroke-width: 1.5; stroke-dasharray: 5 5; marker-end: url(#arrowhead); }
      text {
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        letter-spacing: 0;
      }
      .title { fill: #ffffff; font-size: 24px; font-weight: 700; }
      .subtitle { fill: #94a3b8; font-size: 12px; font-weight: 400; }
      .label { fill: #ffffff; font-size: 12px; font-weight: 600; }
      .small { fill: #94a3b8; font-size: 9px; font-weight: 400; }
      .tiny { fill: #94a3b8; font-size: 8px; font-weight: 400; }
      .section { fill: #cbd5e1; font-size: 10px; font-weight: 600; }
      .tag-cyan { fill: #22d3ee; font-size: 8px; font-weight: 500; }
      .tag-emerald { fill: #34d399; font-size: 8px; font-weight: 500; }
      .tag-violet { fill: #a78bfa; font-size: 8px; font-weight: 500; }
      .tag-amber { fill: #fbbf24; font-size: 8px; font-weight: 500; }
      .tag-rose { fill: #fb7185; font-size: 8px; font-weight: 500; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="860"/>
  <rect width="1200" height="860" fill="url(#grid)" opacity="0.78"/>

  <g transform="translate(48 34)">
    <circle cx="6" cy="10" r="6" fill="#22d3ee">
      <animate attributeName="opacity" values="1;0.45;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text class="title" x="26" y="18">App Page Studio Architecture</text>
    <text class="subtitle" x="26" y="40">Design inputs to structured AI implementation prompts with authenticated collaboration.</text>
  </g>

  <rect x="32" y="92" width="1136" height="630" rx="16" class="card" filter="url(#soft-shadow)"/>
  <rect x="52" y="112" width="1096" height="586" rx="12" class="boundary-runtime"/>
  <text x="70" y="132" class="tag-amber">Runtime boundary: Vite dev workspace or Express-served production build</text>

  <!-- Connections are drawn before boxes so component fills mask passing lines. -->
  <path class="line-cyan" d="M 176 275 L 236 275"/>
  <text x="206" y="267" class="small" text-anchor="middle">browser</text>

  <path class="line-amber" d="M 176 408 L 210 408 Q 236 408 236 382"/>
  <text x="196" y="399" class="small" text-anchor="middle">upload</text>

  <path class="line-cyan" d="M 486 206 L 560 206"/>
  <text x="523" y="198" class="small" text-anchor="middle">SPA assets</text>

  <path class="line-emerald" d="M 486 500 L 560 500"/>
  <text x="523" y="492" class="small" text-anchor="middle">HTTP API</text>

  <path class="line-rose" d="M 486 570 L 560 588"/>
  <text x="526" y="570" class="tag-rose" text-anchor="middle">/ws</text>

  <path class="line-rose" d="M 690 278 L 690 316"/>
  <text x="703" y="302" class="tag-rose">session</text>

  <path class="line-violet" d="M 820 356 L 892 212"/>
  <text x="850" y="268" class="small">users/projects/pages</text>

  <path class="line-amber" d="M 820 456 L 892 418"/>
  <text x="850" y="426" class="small">read/write files</text>

  <path class="line-emerald" d="M 820 506 L 892 586"/>
  <text x="842" y="552" class="small">build prompts</text>

  <path class="line-amber" d="M 1002 510 L 1002 548 L 820 596"/>
  <text x="932" y="538" class="tag-amber">chokidar</text>

  <path class="line-violet" d="M 1010 310 L 1010 354"/>
  <text x="1024" y="336" class="tag-violet">snapshots</text>

  <path class="line-emerald" d="M 690 456 L 690 548"/>
  <text x="704" y="512" class="small">broadcast</text>

  <path class="line-cyan" d="M 360 316 L 360 362"/>
  <path class="line-cyan" d="M 360 456 L 360 492"/>

  <!-- External actors -->
  <rect x="68" y="244" width="108" height="62" rx="6" class="mask"/>
  <rect x="68" y="244" width="108" height="62" rx="6" class="external"/>
  <text x="122" y="269" class="label" text-anchor="middle">Users</text>
  <text x="122" y="286" class="small" text-anchor="middle">browser clients</text>

  <rect x="68" y="376" width="108" height="78" rx="6" class="mask"/>
  <rect x="68" y="376" width="108" height="78" rx="6" class="external"/>
  <text x="122" y="402" class="label" text-anchor="middle">Design Input</text>
  <text x="122" y="419" class="small" text-anchor="middle">HTML ZIP</text>
  <text x="122" y="434" class="small" text-anchor="middle">images / PSD</text>

  <!-- Client cluster -->
  <rect x="220" y="150" width="280" height="478" rx="12" class="boundary-client"/>
  <text x="238" y="170" class="tag-cyan">packages/client - Vite + React</text>

  <rect x="250" y="190" width="220" height="126" rx="6" class="mask"/>
  <rect x="250" y="190" width="220" height="126" rx="6" class="frontend"/>
  <text x="360" y="216" class="label" text-anchor="middle">React App Shell</text>
  <text x="360" y="236" class="small" text-anchor="middle">BrowserRouter + auth gate</text>
  <text x="360" y="252" class="small" text-anchor="middle">Home and dashboard routes</text>
  <text x="360" y="276" class="tag-cyan" text-anchor="middle">App.jsx / pages/*</text>

  <rect x="250" y="362" width="220" height="94" rx="6" class="mask"/>
  <rect x="250" y="362" width="220" height="94" rx="6" class="frontend"/>
  <text x="360" y="388" class="label" text-anchor="middle">Workspace Controller</text>
  <text x="360" y="408" class="small" text-anchor="middle">Zustand slices + hooks</text>
  <text x="360" y="424" class="small" text-anchor="middle">iframe picker / PSD events</text>
  <text x="360" y="442" class="tag-cyan" text-anchor="middle">useWorkspaceController()</text>

  <rect x="250" y="492" width="220" height="78" rx="6" class="mask"/>
  <rect x="250" y="492" width="220" height="78" rx="6" class="frontend"/>
  <text x="360" y="518" class="label" text-anchor="middle">API Clients</text>
  <text x="360" y="538" class="small" text-anchor="middle">auth / projects / pages</text>
  <text x="360" y="554" class="small" text-anchor="middle">html / prompt wrappers</text>

  <!-- Server cluster -->
  <rect x="548" y="150" width="292" height="478" rx="12" class="boundary-server"/>
  <text x="566" y="170" class="tag-emerald">packages/server - Express process</text>

  <rect x="590" y="190" width="200" height="88" rx="6" class="mask"/>
  <rect x="590" y="190" width="200" height="88" rx="6" class="backend"/>
  <text x="690" y="216" class="label" text-anchor="middle">Express Server</text>
  <text x="690" y="236" class="small" text-anchor="middle">static frontend + SPA fallback</text>
  <text x="690" y="252" class="small" text-anchor="middle">/html/:projectId guarded files</text>

  <rect x="590" y="316" width="200" height="72" rx="6" class="mask"/>
  <rect x="590" y="316" width="200" height="72" rx="6" class="security"/>
  <text x="690" y="342" class="label" text-anchor="middle">Auth + Project ACL</text>
  <text x="690" y="362" class="small" text-anchor="middle">express-session cookie aps.sid</text>
  <text x="690" y="376" class="small" text-anchor="middle">requireAuth + role checks</text>

  <rect x="590" y="424" width="200" height="100" rx="6" class="mask"/>
  <rect x="590" y="424" width="200" height="100" rx="6" class="backend"/>
  <text x="690" y="450" class="label" text-anchor="middle">API Routers</text>
  <text x="690" y="470" class="small" text-anchor="middle">projects / pages / html</text>
  <text x="690" y="486" class="small" text-anchor="middle">image / psd / prompt</text>
  <text x="690" y="506" class="tag-emerald" text-anchor="middle">structured conflict responses</text>

  <rect x="590" y="548" width="200" height="58" rx="6" class="mask"/>
  <rect x="590" y="548" width="200" height="58" rx="6" class="bus"/>
  <text x="690" y="572" class="label" text-anchor="middle">WebSocket Hub</text>
  <text x="690" y="590" class="small" text-anchor="middle">presence + file/config events</text>

  <!-- Data and storage cluster -->
  <rect x="880" y="150" width="248" height="478" rx="12" class="boundary-data"/>
  <text x="898" y="170" class="tag-violet">Persistence and generated project data</text>

  <rect x="918" y="190" width="180" height="120" rx="6" class="mask"/>
  <rect x="918" y="190" width="180" height="120" rx="6" class="database"/>
  <text x="1008" y="216" class="label" text-anchor="middle">SQLite</text>
  <text x="1008" y="236" class="small" text-anchor="middle">users + sessions</text>
  <text x="1008" y="252" class="small" text-anchor="middle">projects + members</text>
  <text x="1008" y="268" class="small" text-anchor="middle">pages JSON + revisions</text>
  <text x="1008" y="292" class="tag-violet" text-anchor="middle">studio.db</text>

  <rect x="918" y="354" width="180" height="156" rx="6" class="mask"/>
  <rect x="918" y="354" width="180" height="156" rx="6" class="storage"/>
  <text x="1008" y="380" class="label" text-anchor="middle">Project Workspace</text>
  <text x="1008" y="402" class="small" text-anchor="middle">html_caches/{projectId}</text>
  <text x="1008" y="424" class="small" text-anchor="middle">__html__ exports</text>
  <text x="1008" y="440" class="small" text-anchor="middle">__design__ images</text>
  <text x="1008" y="456" class="small" text-anchor="middle">__assets__ slices</text>
  <text x="1008" y="472" class="small" text-anchor="middle">__psd__ previews</text>
  <text x="1008" y="494" class="tag-amber" text-anchor="middle">safe path resolution</text>

  <rect x="918" y="556" width="180" height="58" rx="6" class="mask"/>
  <rect x="918" y="556" width="180" height="58" rx="6" class="backend"/>
  <text x="1008" y="580" class="label" text-anchor="middle">Prompt Builders</text>
  <text x="1008" y="598" class="small" text-anchor="middle">Flutter / RN / UniApp</text>

  <!-- Cross-cutting save model -->
  <rect x="94" y="645" width="996" height="28" rx="4" class="mask"/>
  <rect x="94" y="645" width="996" height="28" rx="4" class="bus"/>
  <text x="592" y="663" class="tiny" text-anchor="middle" fill="#fb923c">
    Save model: full revision guard, per-file hashes, page-group hash, revision snapshots, and WebSocket merge notifications
  </text>

  <!-- Legend outside the runtime boundary -->
  <text x="70" y="754" class="section">Legend</text>
  <rect x="70" y="770" width="22" height="13" rx="2" class="frontend"/>
  <text x="102" y="780" class="small">Frontend</text>
  <rect x="188" y="770" width="22" height="13" rx="2" class="backend"/>
  <text x="220" y="780" class="small">Backend</text>
  <rect x="306" y="770" width="22" height="13" rx="2" class="security"/>
  <text x="338" y="780" class="small">Auth / access control</text>
  <rect x="492" y="770" width="22" height="13" rx="2" class="database"/>
  <text x="524" y="780" class="small">Database</text>
  <rect x="606" y="770" width="22" height="13" rx="2" class="storage"/>
  <text x="638" y="780" class="small">File workspace</text>
  <rect x="766" y="770" width="22" height="13" rx="2" class="bus"/>
  <text x="798" y="780" class="small">Event or save flow</text>
  <line x1="948" y1="776" x2="986" y2="776" class="line-rose"/>
  <text x="998" y="780" class="small">Session / WebSocket</text>

  <text x="600" y="824" class="tiny" text-anchor="middle">App Page Studio - React workspace, Express API, SQLite collaboration state, and local design asset storage</text>
</svg>
